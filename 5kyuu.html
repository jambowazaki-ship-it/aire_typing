<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&display=swap" rel="stylesheet">
    <title>Pic単 5級</title>
    <link rel="icon" href="fabicon.png" type="image/png">

    <style> /*CSS*/
        h1 {font-size: 50px; color:black; margin-top: 20px; margin-bottom: 10px; font-family: "Playfair Display";}
        .P {font-size: 50px; color:#E1A4B3; margin-top: 20px; margin-left: 10px; margin-bottom: 10px; font-family: "Playfair Display";}
        h2 {font-size: 40px; color: black; margin:10px; font-family: "ヒラギノ丸ゴシック体 W2";}
        .word {font-size: 30px; color: black; margin: 10px; font-family: "ヒラギノ丸ゴシック体 W2";}
        #answer {width: 500px; font-size: 20px; margin-left: auto; margin-right: auto; padding: 10px; border-radius: 10px; border: 2px solid #92aaff;}
        .judge-button {width: 65px; font-size: 20px; padding: 10px; border-radius: 10px; border: none; background-color: #6b8cff; color: white; cursor: pointer;}

    </style>
</head>

<body>
    <div class="wrap">
        <header>
            <h1><span class="P">  P</span> i c 単 </h1>
        </header>
        <div>
            <h2>5級</h2>
        </div>

        <p id="word" class="word"></p>
        <input type="text" id="answer" autocomplete="off" placeholder="Type here" autofocus>
        <button id="mainBtn"onclick="handleButton()" class="judge-button">next</button>
        <div id="resultMessage"></div>

    </div>

</body> 


<script>
    let allWords = [];
    let words = [];
    let currentWord = 0;
    let isAnswered = false;

    fetch("words_5.json") //単語データの読み込み
        .then(Response => Response.json())
        .then(wordsdata => {
            words = wordsdata;
            console.log(words);
            Nextword();
        })
        .catch(error => console.error("Error loading words:", error));


    function shuffleArray(array) { //単語のシャッフル
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }


    window.onload = () => {
        const answerElement = document.getElementById("answer");

        answerElement.addEventListener("keydown", (event) =>{ //Enterで答え合わせ
            if (event.key === "Enter") {
                handleButton();
            }
        });
    };


    function Nextword() { //単語の表示
        document.getElementById("word").textContent = words[currentWord].meaning;
    }


    function nextWord() { //次へボタン
        currentWord++;
        const resultMessage = document.getElementById('resultMessage');
        resultMessage.innerText = ''; //正誤を消す

        if (currentWord < words.length) {
            Nextword();
        } 
        else {
            alert("You have completed all the words!");
            currentWord = 0; // 最初に戻る
            Nextword();
        }
    }


    function checkAnswer() { //答え合わせ
        const answerInput = document.getElementById("answer");
        const answerValue = answerInput.value;
        const correctAnswer = words[currentWord].word;

        const resultMessage = document.getElementById('resultMessage');
        if (answerValue.trim().toLowerCase() === correctAnswer) {
            resultMessage.innerText = '正解です！';
            resultMessage.style.color = 'green';

            return true;
        } 
        else {
            resultMessage.innerText = '残念！';
            resultMessage.style.color = 'red'; 

            answerInput.value = '';
            answerInput.focus();

            return false;
        }

    }


    function handleButton() { //ボタンの切り替え
    const mainBtn = document.getElementById("mainBtn");
    const answerInput = document.getElementById("answer");
    const resultMessage = document.getElementById('resultMessage');

    if (isAnswered === false) {
        const isCorrect = checkAnswer(); 

        if (isCorrect === true) {
            isAnswered = true;
            mainBtn.textContent = "Next";
        }
    }
    else {
        nextWord(); 
        isAnswered = false;
        
        answerInput.value = "";
        if (resultMessage) resultMessage.innerText = "";
        mainBtn.textContent = "Check";
        answerInput.focus();
    }
}


</script>
